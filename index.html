<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Hourglass — Digital Twin Timer</title>
<style>
  :root {
    --sand: #d9a95c;
    --sand-bright: #f0c987;
    --ink: #e8e4dc;
    --ink-dim: #9a958b;
    --panel: rgba(20, 22, 30, 0.55);
    --stroke: rgba(255, 255, 255, 0.10);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: "Avenir Next", "Segoe UI", system-ui, sans-serif;
    background: radial-gradient(120% 90% at 50% 30%, #1a1d27 0%, #0c0e15 55%, #050609 100%);
    color: var(--ink);
    user-select: none;
    -webkit-user-select: none;
  }
  #scene { position: fixed; inset: 0; display: block; touch-action: none; }

  header {
    position: fixed; top: 22px; left: 28px; z-index: 5; pointer-events: none;
  }
  header h1 {
    font-size: 15px; font-weight: 600; letter-spacing: 0.32em; color: var(--ink);
  }
  header h1 span {
    display: block; font-size: 10px; font-weight: 400; letter-spacing: 0.24em;
    color: var(--ink-dim); margin-top: 4px;
  }

  #readout {
    position: fixed; top: 26px; left: 50%; transform: translateX(-50%);
    text-align: center; z-index: 5; pointer-events: none;
  }
  #clock {
    font-size: clamp(44px, 7vw, 64px); font-weight: 200;
    font-variant-numeric: tabular-nums; letter-spacing: 0.04em;
    color: var(--ink); text-shadow: 0 2px 24px rgba(0,0,0,0.6);
    transition: color 0.4s;
  }
  #clock.done { color: var(--sand-bright); }
  #status {
    font-size: 11px; letter-spacing: 0.28em; text-transform: uppercase;
    color: var(--ink-dim); margin-top: 2px;
  }

  #muteBtn {
    position: fixed; top: 24px; right: 28px; z-index: 6;
    width: 40px; height: 40px; border-radius: 50%;
    background: var(--panel); border: 1px solid var(--stroke);
    color: var(--ink-dim); font-size: 16px; cursor: pointer;
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  }
  #muteBtn:hover { color: var(--ink); }

  #panel {
    position: fixed; bottom: 26px; left: 50%; transform: translateX(-50%);
    z-index: 5; display: flex; flex-direction: column; gap: 12px; align-items: center;
    padding: 16px 22px; border-radius: 20px;
    background: var(--panel); border: 1px solid var(--stroke);
    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    box-shadow: 0 12px 40px rgba(0,0,0,0.45);
    max-width: min(94vw, 620px);
  }
  .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; justify-content: center; }

  .chip {
    padding: 7px 15px; border-radius: 999px; font-size: 13px; font-weight: 500;
    background: rgba(255,255,255,0.05); border: 1px solid var(--stroke);
    color: var(--ink-dim); cursor: pointer; transition: all 0.15s;
  }
  .chip:hover { color: var(--ink); border-color: rgba(255,255,255,0.25); }
  .chip.active {
    background: rgba(217, 169, 92, 0.16); border-color: var(--sand);
    color: var(--sand-bright);
  }
  #customMin {
    width: 64px; padding: 7px 10px; border-radius: 999px; font-size: 13px;
    background: rgba(255,255,255,0.05); border: 1px solid var(--stroke);
    color: var(--ink); outline: none; text-align: center;
  }
  #customMin::placeholder { color: var(--ink-dim); }
  #customMin:focus { border-color: var(--sand); }

  .btn {
    padding: 10px 22px; border-radius: 12px; font-size: 14px; font-weight: 600;
    letter-spacing: 0.04em; cursor: pointer; transition: all 0.15s;
    background: rgba(255,255,255,0.07); border: 1px solid var(--stroke); color: var(--ink);
  }
  .btn:hover:not(:disabled) { background: rgba(255,255,255,0.13); }
  .btn:disabled { opacity: 0.35; cursor: default; }
  .btn.primary {
    background: linear-gradient(160deg, #e3b269, #b97f35); color: #221503;
    border-color: transparent;
  }
  .btn.primary:hover:not(:disabled) { filter: brightness(1.1); }

  #stats {
    font-size: 11px; letter-spacing: 0.08em; color: var(--ink-dim);
    font-variant-numeric: tabular-nums;
  }
  #hint {
    position: fixed; bottom: 6px; left: 50%; transform: translateX(-50%);
    font-size: 10px; letter-spacing: 0.14em; color: rgba(255,255,255,0.22); z-index: 4;
  }

  #overlay {
    position: fixed; inset: 0; z-index: 20; display: flex;
    align-items: center; justify-content: center;
    background: rgba(5, 6, 9, 0.78); backdrop-filter: blur(6px);
    transition: opacity 0.5s;
  }
  #overlay.hidden { opacity: 0; pointer-events: none; }
  #overlay .card { text-align: center; width: 280px; }
  #overlay .glass-icon { font-size: 44px; animation: turn 2.4s ease-in-out infinite; display: inline-block; }
  @keyframes turn { 0%, 60% { transform: rotate(0); } 90%, 100% { transform: rotate(180deg); } }
  #overlayText { margin: 16px 0 14px; font-size: 13px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-dim); }
  .bar { height: 3px; border-radius: 2px; background: rgba(255,255,255,0.08); overflow: hidden; }
  .bar i { display: block; height: 100%; width: 0%; border-radius: 2px; background: linear-gradient(90deg, #b97f35, #f0c987); transition: width 0.2s; }
  #err { color: #e08a7a; font-size: 13px; line-height: 1.6; letter-spacing: 0; text-transform: none; display: none; }
</style>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.164.1/examples/jsm/",

</head>
<body>
<canvas id="scene"></canvas>

<header><h1>HOURGLASS<span>A DIGITAL TWIN · V2</span></h1></header>

<div id="readout">
  <div id="clock">01:00</div>
  <div id="status">preparing</div>
</div>

<button id="muteBtn" title="toggle sound">🔊</button>

<div id="panel">
  <div class="row" id="presets">
    <button class="chip" data-secs="15">15 sec</button>
    <button class="chip active" data-secs="60">1 min</button>
    <button class="chip" data-secs="300">5 min</button>
    <button class="chip" data-secs="3600">60 min</button>
    <input id="customMin" type="number" min="0.25" max="180" step="any" placeholder="min" title="custom minutes" />
  </div>
  <div class="row">
    <button class="btn primary" id="startBtn">Start</button>
    <button class="btn" id="flipBtn">⟲ Flip</button>
    <button class="btn" id="resetBtn">Reset</button>
  </div>
  <div id="stats">—</div>
</div>
<div id="hint">drag to orbit · scroll to zoom · space start/pause · F flip · R reset</div>

<div id="overlay">
  <div class="card">
    <span class="glass-icon">⌛</span>
    <p id="overlayText">Blowing the glass…</p>
    <div class="bar"><i id="overlayBar"></i></div>
    <p id="err"></p>
  </div>
</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';
import * as RAPIER_NS from '@dimforge/rapier3d-simd-compat';
const RAPIER = RAPIER_NS.default ?? RAPIER_NS;

/* ============================================================ *
 *  V2 — the control plane changed, the physics stayed honest.
 *
 *  V1 metered the sand with a collision-filtered gate that grains
 *  physically squeezed past. Real granular arching jammed it, and
 *  keeping the funnel awake to fight the jams melted the frame
 *  budget at high grain counts. V2 adopts the "freeze-plug"
 *  architecture (credit: the Opus 4.8 build of this benchmark):
 *
 *  - grains sinking into the throat column are pinned as Fixed
 *    bodies — a self-forming plug the pile rests on. Fixed and
 *    sleeping bodies cost the solver nothing.
 *  - releasing a grain = unpin + move it across the throat to just
 *    below the neck with a small downward velocity. The ~1-unit
 *    hop is invisible inside the waist; the fall, the stream and
 *    the heap are all real simulation.
 *  - the wall clock owns the release count (N·t/T). Physics is
 *    only asked to do what it is good at.
 *
 *  Grain count is now constant (quality), decoupled from duration;
 *  the radius is derived from the cavity volume so the bulb always
 *  fills to the same line.
 *
 *  The world is built at 10x real scale (1 unit = 10 cm) so grain
 *  radii sit near Rapier's solver tolerances.
 * ============================================================ */
const G        = 75;      // slightly gentle gravity: calmer grains sleep sooner
const H        = 15.5;    // interior half-height of the glass
const BULB_R   = 10.5;    // widest interior radius
const NECK_R   = 1.3;     // interior radius at the waist
const CAP_R    = 5.2;     // interior radius where glass meets the wooden caps
const WAIST_Y  = 0.62 * H;
const THROAT_H = 0.6;     // half-height of the narrow throat region

const GRAINS_N   = 2000;
const PACKING    = 0.62;  // random close packing of spheres
const DT         = 1 / 120;
const MAX_STEPS  = 3;     // shed backlog beyond this — never spiral
const V_MAX      = 60;    // clamp: V_MAX*DT ≈ 1.05 grain radii (anti-tunnel)
const SLEEP_SP2  = 0.25;  // force-sleep below 0.5 units/s
const TRANSIT_S  = 0.9;   // mean neck→pile fall time; schedule finishes early
const REL_CAP    = 60;    // max releases per frame (tab-resume catch-up)
const BANDS      = 12;    // same-frame bursts stack into vertical bands

/* Interior radius of the glass at height |y| — one profile drives the
   visual lathe, the physics walls and the grain seeding. */
function profileR(u) {
  const smooth = (t) => t * t * (3 - 2 * t);
  if (u <= WAIST_Y) return NECK_R + (BULB_R - NECK_R) * smooth(u / WAIST_Y);
  const t = Math.min(1, (u - WAIST_Y) / (H - WAIST_Y));
  return BULB_R + (CAP_R - BULB_R) * smooth(t);
}

/* Grain radius derived from the fill volume, so N grains always fill the
   bulb to the same line. */
function grainRadiusFor(count) {
  const yTop = H * 0.78;
  let v = 0;
  const steps = 240;
  for (let i = 0; i < steps; i++) {
    const y = THROAT_H + ((yTop - THROAT_H) * (i + 0.5)) / steps;
    const r = profileR(y);
    v += Math.PI * r * r * ((yTop - THROAT_H) / steps);
  }
  const perGrain = (v * PACKING) / count;
  const r = Math.cbrt(perGrain / ((4 / 3) * Math.PI));
  return Math.max(0.3, Math.min(0.62, r));
}
const GRAIN_R = grainRadiusFor(GRAINS_N);

// freeze-plug geometry
const Y_HOLD   = THROAT_H + GRAIN_R * 1.4;          // freeze line
const HOLD_R2  = (NECK_R * 1.9) ** 2;               // throat column radius²
const FEED_Y   = THROAT_H + GRAIN_R * 9;            // wake band above the throat
const FEED_R2  = (NECK_R * 2.2) ** 2;               // central wake column

/* ============================================================ *
 *  DOM
 * ============================================================ */
const $ = (id) => document.getElementById(id);
const clockEl = $('clock'), statusEl = $('status'), statsEl = $('stats');
const overlayEl = $('overlay'), overlayText = $('overlayText'), overlayBar = $('overlayBar'), errEl = $('err');
const startBtn = $('startBtn'), flipBtn = $('flipBtn'), resetBtn = $('resetBtn'), muteBtn = $('muteBtn');

function fatal(msg) {
  overlayEl.classList.remove('hidden');
  overlayText.style.display = 'none';
  errEl.style.display = 'block';
  errEl.textContent = msg;
}

/* ============================================================ *
 *  Three.js scene
 * ============================================================ */
const renderer = new THREE.WebGLRenderer({ canvas: $('scene'), antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.05;
renderer.domElement.addEventListener('webglcontextlost', (e) => {
  e.preventDefault();
  fatal('The graphics context was lost — please refresh the page.');
});

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0d0f16);
scene.fog = new THREE.Fog(0x0d0f16, 150, 420);
const pmrem = new THREE.PMREMGenerator(renderer);
const envScene = new RoomEnvironment();
scene.environment = pmrem.fromScene(envScene, 0.04).texture;
pmrem.dispose();
envScene.dispose();

const camera = new THREE.PerspectiveCamera(42, innerWidth / innerHeight, 0.5, 500);
camera.position.set(34, 13, 47);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 0, 0);
controls.enableDamping = true;
controls.dampingFactor = 0.06;
controls.autoRotate = false; // a real hourglass does not spin on its own
controls.minDistance = 25;
controls.maxDistance = 130;
controls.maxPolarAngle = Math.PI / 2 + 0.25;

const keyLight = new THREE.DirectionalLight(0xfff2dd, 2.8);
keyLight.position.set(40, 70, 50);
keyLight.castShadow = true;
keyLight.shadow.mapSize.set(2048, 2048);
keyLight.shadow.camera.left = -45; keyLight.shadow.camera.right = 45;
keyLight.shadow.camera.top = 45;   keyLight.shadow.camera.bottom = -45;
keyLight.shadow.camera.far = 250;
keyLight.shadow.bias = -0.0008;
keyLight.shadow.normalBias = 0.4;
scene.add(keyLight);
scene.add(new THREE.HemisphereLight(0x8899bb, 0x21160a, 0.5));
const rim = new THREE.PointLight(0xd9a95c, 2200, 0, 2);
rim.position.set(-30, 25, -30);
scene.add(rim);

/* Everything that flips lives in this group (glass, frame, sand). */
const rig = new THREE.Group();
scene.add(rig);

/* --- Glass --- */
const lathePts = [new THREE.Vector2(0.15, -H)];
for (let i = 0; i <= 72; i++) {
  const y = -H + (2 * H * i) / 72;
  lathePts.push(new THREE.Vector2(profileR(Math.abs(y)) + 0.12, y));
}
lathePts.push(new THREE.Vector2(0.15, H));
const glassGeo = new THREE.LatheGeometry(lathePts, 72);
const glassMat = new THREE.MeshPhysicalMaterial({
  transmission: 1, thickness: 0.9, roughness: 0.035, ior: 1.45,
  clearcoat: 0.5, clearcoatRoughness: 0.18,
  attenuationColor: new THREE.Color(0xeaf4f8), attenuationDistance: 140,
  specularIntensity: 0.6, envMapIntensity: 0.45,
});
const cheapGlassMat = new THREE.MeshPhysicalMaterial({
  transparent: true, opacity: 0.14, roughness: 0.08, metalness: 0,
  depthWrite: false, envMapIntensity: 1.3,
});
const glass = new THREE.Mesh(glassGeo, glassMat);
rig.add(glass);

/* --- Wooden frame --- */
const woodMat = new THREE.MeshStandardMaterial({ color: 0x5c3a22, roughness: 0.62, metalness: 0.05 });
const woodDark = new THREE.MeshStandardMaterial({ color: 0x472c18, roughness: 0.7, metalness: 0.05 });
for (const s of [-1, 1]) {
  const cap = new THREE.Mesh(new THREE.CylinderGeometry(BULB_R + 2.2, BULB_R + 2.2, 1.5, 48), woodMat);
  cap.position.y = s * (H + 0.75);
  cap.castShadow = cap.receiveShadow = true;
  rig.add(cap);
  const lip = new THREE.Mesh(new THREE.TorusGeometry(BULB_R + 2.2, 0.28, 12, 64), woodDark);
  lip.rotation.x = Math.PI / 2;
  lip.position.y = s * (H + 1.55);
  lip.castShadow = true;
  rig.add(lip);
}
for (let i = 0; i < 4; i++) {
  const a = (i / 4) * Math.PI * 2 + Math.PI / 4;
  const post = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.5, 2 * H + 1.5, 16), woodDark);
  post.position.set(Math.cos(a) * (BULB_R + 1.3), 0, Math.sin(a) * (BULB_R + 1.3));
  post.castShadow = true;
  rig.add(post);
}

/* --- Table (static, does not flip) --- */
const table = new THREE.Mesh(
  new THREE.CylinderGeometry(34, 36, 2.4, 64),
  new THREE.MeshStandardMaterial({ color: 0x241a12, roughness: 0.85 })
);
table.position.y = -(H + 1.83) - 1.2;
table.receiveShadow = true;
scene.add(table);

/* --- Sand instances: faceted, flat-shaded, palette-jittered grit --- */
const grainGeo = new THREE.IcosahedronGeometry(GRAIN_R, 0);
const grainMat = new THREE.MeshStandardMaterial({
  roughness: 0.95, metalness: 0, flatShading: true, envMapIntensity: 0.45,
});
const grainMesh = new THREE.InstancedMesh(grainGeo, grainMat, GRAINS_N);
grainMesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
grainMesh.castShadow = true;
grainMesh.frustumCulled = false;
{
  const palette = [0xe8c074, 0xdca85a, 0xf0d089, 0xcf9a4c, 0xe3b366, 0xf5dca0];
  const c = new THREE.Color(), hsl = {};
  for (let i = 0; i < GRAINS_N; i++) {
    c.setHex(palette[(Math.random() * palette.length) | 0]);
    c.getHSL(hsl);
    c.setHSL(hsl.h, hsl.s + (Math.random() - 0.5) * 0.05, hsl.l + (Math.random() - 0.5) * 0.09);
    grainMesh.setColorAt(i, c);
  }
  grainMesh.instanceColor.needsUpdate = true;
}
rig.add(grainMesh);

/* ============================================================ *
 *  Physics
 * ============================================================ */
let world, bodies = [];
let N = 0;
const posCache = new Float32Array(GRAINS_N * 3);
const frozen = new Uint8Array(GRAINS_N);    // pinned as Fixed in the throat plug
const released = new Uint8Array(GRAINS_N);  // already sent through the neck this run
const slowFrames = new Uint8Array(GRAINS_N); // consecutive slow frames before force-sleep
let frozenList = [];                        // release order: last frozen = lowest
const settleCache = new Map();

/* Glass walls: rings of thick convex cuboids tracing the lathe profile.
   Zero-thickness trimeshes eject grains under pile pressure; solid boxes
   cannot. Zero escapes across every V1 test run — kept verbatim. */
function buildStaticColliders() {
  const fixed = world.createRigidBody(RAPIER.RigidBodyDesc.fixed());
  const WBANDS = 30, SEGS = 26, WALL_T = 0.9;
  const q = new THREE.Quaternion(), basis = new THREE.Matrix4();
  const xA = new THREE.Vector3(), yA = new THREE.Vector3(), zA = new THREE.Vector3();
  for (let b = 0; b < WBANDS; b++) {
    const y0 = -H + (2 * H * b) / WBANDS, y1 = -H + (2 * H * (b + 1)) / WBANDS;
    const r0 = profileR(Math.abs(y0)), r1 = profileR(Math.abs(y1));
    const ym = (y0 + y1) / 2, rm = (r0 + r1) / 2;
    const dr = r1 - r0, dy = y1 - y0;
    const L = Math.hypot(dr, dy);
    const nu = dy / L, ny = -dr / L;
    const cu = rm + nu * (WALL_T / 2), cy = ym + ny * (WALL_T / 2);
    const chord = (2 * Math.PI * Math.max(cu, 0.4)) / SEGS;
    for (let s = 0; s < SEGS; s++) {
      const a = (s / SEGS) * Math.PI * 2;
      const ca = Math.cos(a), sa = Math.sin(a);
      yA.set((dr / L) * ca, dy / L, (dr / L) * sa);
      xA.set(-sa, 0, ca);
      zA.crossVectors(xA, yA).normalize();
      basis.makeBasis(xA, yA, zA);
      q.setFromRotationMatrix(basis);
      world.createCollider(
        RAPIER.ColliderDesc.cuboid(chord * 0.62, L / 2 + 0.12, WALL_T / 2)
          .setTranslation(cu * ca, cy, cu * sa)
          .setRotation({ x: q.x, y: q.y, z: q.z, w: q.w })
          .setFriction(0.55).setRestitution(0.02),
        fixed
      );
    }
  }
  for (const s of [-1, 1]) {
    world.createCollider(
      RAPIER.ColliderDesc.cylinder(0.5, CAP_R + 1.2)
        .setTranslation(0, s * (H + 0.48), 0)
        .setFriction(0.55).setCollisionGroups(0xffffffff),
      fixed
    );
  }
}

/* Near-packed seeding: rings at ~touching spacing so the pile is already
   at settled density and the settle transient is tiny. */
function seedPositions(count) {
  const out = [];
  const jit = () => (Math.random() - 0.5) * GRAIN_R * 0.6;
  const spacing = GRAIN_R * 1.96;
  for (let y = THROAT_H + GRAIN_R; y < H - 1.2 && out.length < count; y += GRAIN_R * 1.75) {
    const rMax = profileR(Math.abs(y)) - GRAIN_R - 0.15;
    if (rMax <= 0) continue;
    out.push([jit() * 0.4, y, jit() * 0.4]);
    const a0 = y * 3.7;
    for (let rr = spacing; rr <= rMax && out.length < count; rr += spacing) {
      const n = Math.max(3, Math.floor((Math.PI * 2 * rr) / spacing));
      for (let k = 0; k < n && out.length < count; k++) {
        const a = a0 + (k / n) * Math.PI * 2;
        out.push([Math.cos(a) * rr + jit(), y + jit() * 0.4, Math.sin(a) * rr + jit()]);
      }
    }
  }
  return out;
}

function buildSand() {
  const pts = seedPositions(GRAINS_N);
  N = pts.length;
  for (let i = 0; i < N; i++) {
    const [x, y, z] = pts[i];
    const body = world.createRigidBody(
      RAPIER.RigidBodyDesc.dynamic().setTranslation(x, y, z)
        .setLinearDamping(0.3).setAngularDamping(0.8)
        .setSoftCcdPrediction(GRAIN_R * 4)
    );
    world.createCollider(
      RAPIER.ColliderDesc.ball(GRAIN_R)
        .setFriction(0.55).setRestitution(0).setDensity(1.4),
      body
    );
    bodies.push(body);
    posCache[i * 3] = x; posCache[i * 3 + 1] = y; posCache[i * 3 + 2] = z;
  }
  grainMesh.count = N;
}

/* ============================================================ *
 *  App state
 * ============================================================ */
let state = 'boot';         // boot | settling | ready | running | paused | done
let baseDuration = 60;
let effDuration = 60;
let startStamp = 0, elapsedMs = 0;
let releasedCount = 0, topStart = 0;
let orientation = 1;        // +1: top chamber is +Y in physics space
let thetaBase = 0;
let flipPhase = null;       // null | 'turn' | 'settle'
let flipT0 = 0, flipSettleT0 = 0;
const FLIP_MS = 1400, FLIP_SETTLE_MS = 700;
let escaped = 0, relRate = 0;

function setGravity(gx, gy) {
  world.gravity.x = gx; world.gravity.y = gy; world.gravity.z = 0;
}

/* ---------- freeze-plug ---------- */
function freeze(i) {
  bodies[i].setBodyType(RAPIER.RigidBodyType.Fixed, false);
  frozen[i] = 1;
  frozenList.push(i);
}
function unfreeze(i, wake) {
  bodies[i].setBodyType(RAPIER.RigidBodyType.Dynamic, wake);
  frozen[i] = 0;
}
function unfreezeAll() {
  for (let i = 0; i < N; i++) if (frozen[i]) unfreeze(i, true);
  frozenList = [];
}

/* Freeze any unreleased grain that has sunk into the throat column.
   Called on live frames and periodically during settle — this IS the plug
   that keeps the hourglass from draining on its own. */
function freezePass() {
  for (let i = 0; i < N; i++) {
    if (frozen[i] || released[i]) continue;
    const yo = posCache[i * 3 + 1] * orientation;
    if (yo > Y_HOLD) continue;
    const x = posCache[i * 3], z = posCache[i * 3 + 2];
    if (x * x + z * z < HOLD_R2) freeze(i);
  }
}

/* Release = the magician's sleeve: hop the grain across the throat to a
   tight spot just below the neck and let gravity do the rest. Same-frame
   bursts stack into vertical bands so catch-up never spawns a clump. */
function dropThroughNeck(i, burstIdx) {
  const band = burstIdx % BANDS; // same-frame bursts go deeper; a lone release sits just below the throat
  const a = Math.random() * Math.PI * 2;
  const rr = Math.random() * NECK_R * 0.4;
  if (frozen[i]) unfreeze(i, true);
  bodies[i].setTranslation({
    x: Math.cos(a) * rr,
    y: -(THROAT_H + GRAIN_R * 1.6 + band * GRAIN_R * 2.2) * orientation,
    z: Math.sin(a) * rr,
  }, true);
  bodies[i].setLinvel({
    x: (Math.random() - 0.5) * 1.5,
    y: -3 * orientation,
    z: (Math.random() - 0.5) * 1.5,
  }, true);
  bodies[i].setAngvel({ x: 0, y: 0, z: 0 }, false);
  released[i] = 1;
  releasedCount++;
}

/* Wake the feed zone above the throat so the pile keeps slumping into the
   plug — a narrow band + central column, never the whole pile. */
function wakeFeedZone() {
  for (let i = 0; i < N; i++) {
    if (frozen[i] || released[i]) continue;
    const yo = posCache[i * 3 + 1] * orientation;
    if (yo < 0) continue;
    const x = posCache[i * 3], z = posCache[i * 3 + 2];
    const r2 = x * x + z * z;
    if (yo < FEED_Y || r2 < FEED_R2) bodies[i].wakeUp();
  }
}

/* The metering contract: by progress p, round(topStart·p) grains must have
   been released. Pop the plug first (its last entries ARE the lowest
   grains); fall back to the lowest cached unreleased grain. */
function meter(now, complete = false) {
  if (!complete) elapsedMs = now - startStamp;
  const p = complete ? 1 : Math.min(1, (elapsedMs / 1000) / Math.max(0.5, effDuration - TRANSIT_S));
  const target = complete ? topStart : Math.round(topStart * p);
  let need = Math.min(REL_CAP, target - releasedCount);
  let releasedNow = 0;
  if (need > 0) {
    while (need > 0 && frozenList.length) {
      const i = frozenList.pop();
      if (released[i] || !frozen[i]) continue;
      dropThroughNeck(i, releasedNow);
      need--; releasedNow++;
    }
    if (need > 0) {
      // plug is empty — release the lowest unreleased grains directly
      const cands = [];
      for (let i = 0; i < N; i++) if (!released[i]) cands.push(i);
      cands.sort((a, b) => posCache[a * 3 + 1] * orientation - posCache[b * 3 + 1] * orientation);
      for (let k = 0; k < cands.length && need > 0; k++) {
        dropThroughNeck(cands[k], releasedNow);
        need--; releasedNow++;
      }
    }
    if (releasedNow > 0) wakeFeedZone();
  }
  // EMA must decay on no-release frames too, or slow drips read as a torrent
  relRate = relRate * 0.92 + releasedNow * 60 * 0.08;
}

/* ---------- the merged O(N) pass: cache + clamp + sleep + rescue + sync ---------- */
const _m = new THREE.Matrix4(), _q = new THREE.Quaternion(), _v = new THREE.Vector3(), _s = new THREE.Vector3(1, 1, 1);
function postStep(force = false) {
  let dirty = false;
  const maxSq = V_MAX * V_MAX;
  for (let i = 0; i < N; i++) {
    const b = bodies[i];
    if (!force && (frozen[i] || b.isSleeping())) continue;
    const t = b.translation(), r = b.rotation();
    posCache[i * 3] = t.x; posCache[i * 3 + 1] = t.y; posCache[i * 3 + 2] = t.z;
    if (!frozen[i]) {
      const v = b.linvel();
      const sq = v.x * v.x + v.y * v.y + v.z * v.z;
      if (sq > maxSq) {
        const s = V_MAX / Math.sqrt(sq);
        b.setLinvel({ x: v.x * s, y: v.y * s, z: v.z * s }, true);
        slowFrames[i] = 0;
      } else if (!force && sq < SLEEP_SP2 && state !== 'settling' && !flipPhase) {
        // require sustained slowness — a ballistic apex is slow for only ~one frame,
        // and sleeping a grain mid-air leaves it hanging there
        if (++slowFrames[i] >= 4) { b.sleep(); slowFrames[i] = 0; }
      } else {
        slowFrames[i] = 0;
      }
      // radial containment — the glass is a lathe, "inside" is a 2D test
      const rxz = Math.hypot(t.x, t.z);
      if (rxz > profileR(Math.min(Math.abs(t.y), H)) + GRAIN_R * 2 || Math.abs(t.y) > H + 1.5) {
        escaped++;
        const yc = THREE.MathUtils.clamp(t.y, -H + 1, H - 1);
        const rSafe = Math.max(0.1, profileR(Math.abs(yc)) * 0.5);
        const sc = rxz > 1e-4 ? rSafe / rxz : 0;
        b.setTranslation({ x: t.x * sc, y: yc, z: t.z * sc }, true);
        b.setLinvel({ x: 0, y: 0, z: 0 }, true);
      }
    }
    _v.set(t.x, t.y, t.z);
    _q.set(r.x, r.y, r.z, r.w);
    _m.compose(_v, _q, _s);
    grainMesh.setMatrixAt(i, _m);
    dirty = true;
  }
  if (dirty) grainMesh.instanceMatrix.needsUpdate = true;
}

/* ---------- settle (boot only — seeding is near-packed already) ---------- */
let settle = null;
function beginSettle(nextState) {
  state = 'settling';
  settle = { steps: 0, next: nextState };
  overlayText.style.display = '';
  overlayText.textContent = 'Pouring the sand…';
  errEl.style.display = 'none';
  overlayEl.classList.remove('hidden');
  updateButtons();
}
function settleTick(gap) {
  const n = Math.max(10, Math.min(160, Math.round(gap / DT) + 4));
  for (let k = 0; k < n; k++) {
    world.step();
    settle.steps++;
    if (settle.steps % 7 === 0) { postStep(); freezePass(); }
  }
  postStep(); freezePass();
  overlayBar.style.width = Math.min(100, (settle.steps / 420) * 100) + '%';
  if (settle.steps < 180) return;
  let maxV = 0;
  for (let i = 0; i < N; i++) {
    if (frozen[i] || bodies[i].isSleeping()) continue;
    const v = bodies[i].linvel();
    maxV = Math.max(maxV, v.x * v.x + v.y * v.y + v.z * v.z);
  }
  if (maxV < 0.6 || settle.steps > 900) {
    const cache = new Float32Array(N * 8);
    for (let i = 0; i < N; i++) {
      const t = bodies[i].translation(), r = bodies[i].rotation();
      cache.set([t.x, t.y, t.z, r.x, r.y, r.z, r.w, frozen[i]], i * 8);
    }
    settleCache.set(N, cache);
    const next = settle.next;
    settle = null;
    overlayEl.classList.add('hidden');
    overlayBar.style.width = '0%';
    enterReady();
    if (next === 'running') beginRun();
  }
}

function restoreFromCache() {
  const cache = settleCache.get(N);
  if (!cache) return false;
  for (let i = 0; i < N; i++) {
    const o = i * 8;
    if (frozen[i]) unfreeze(i, false);
    bodies[i].setTranslation({ x: cache[o], y: cache[o + 1], z: cache[o + 2] }, false);
    bodies[i].setRotation({ x: cache[o + 3], y: cache[o + 4], z: cache[o + 5], w: cache[o + 6] }, false);
    bodies[i].setLinvel({ x: 0, y: 0, z: 0 }, false);
    bodies[i].setAngvel({ x: 0, y: 0, z: 0 }, false);
    released[i] = 0;
    posCache[i * 3] = cache[o]; posCache[i * 3 + 1] = cache[o + 1]; posCache[i * 3 + 2] = cache[o + 2];
  }
  frozenList = [];
  for (let i = 0; i < N; i++) {
    if (cache[i * 8 + 7]) freeze(i);
    else bodies[i].sleep();
  }
  return true;
}

function enterReady() {
  state = 'ready';
  releasedCount = 0; elapsedMs = 0; relRate = 0;
  topStart = N;
  effDuration = baseDuration;
  clockEl.classList.remove('done');
  postStep(true);
  updateButtons(); setStatus('ready');
}

function applyDuration(secs) {
  baseDuration = secs;
  fullReset();
}

function fullReset() {
  if (!world) return; // R pressed during the boot await
  thetaBase = 0; orientation = 1; rig.rotation.z = 0; setGravity(0, -G);
  flipPhase = null;
  if (!restoreFromCache()) { beginSettle('ready'); return; }
  enterReady();
}

/* ---------- run ---------- */
function beginRun() {
  startStamp = performance.now();
  state = 'running';
  ensureAudio();
  updateButtons(); setStatus('flowing');
}

function finishRun() {
  state = 'done';
  clockEl.classList.add('done');
  chime();
  updateButtons(); setStatus("time's up — flip to restart");
}

/* ---------- flip ----------
   Equivalent-frame trick: the physics world never rotates. The rendered
   rig turns by θ while gravity is set to Rz(−θ)·(0,−g,0) — the sand
   genuinely tumbles. The plug is unfrozen first so it tumbles too. */
function startFlip() {
  if (flipPhase || state === 'settling' || state === 'boot') return;
  flipPhase = 'turn';
  flipT0 = performance.now();
  ensureAudio();
  unfreezeAll();
  for (let i = 0; i < N; i++) bodies[i].wakeUp();
  state = 'ready';
  setStatus('flipping');
  updateButtons();
}
function flipTick(now) {
  if (flipPhase === 'turn') {
    const t = Math.min(1, (now - flipT0) / FLIP_MS);
    const e = t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
    const theta = thetaBase + e * Math.PI;
    rig.rotation.z = theta;
    setGravity(-G * Math.sin(theta), -G * Math.cos(theta));
    if ((now - flipT0) % 200 < 34) for (let i = 0; i < N; i++) bodies[i].wakeUp();
    if (t >= 1) {
      thetaBase = (thetaBase + Math.PI) % (2 * Math.PI);
      rig.rotation.z = thetaBase;
      orientation = Math.abs(thetaBase) < 0.1 ? 1 : -1;
      setGravity(0, -G * orientation);
      flipPhase = 'settle';
      flipSettleT0 = now;
      setStatus('settling');
    }
  } else if (flipPhase === 'settle') {
    if (now - flipSettleT0 < FLIP_SETTLE_MS) return;
    flipPhase = null;
    let top = 0;
    for (let i = 0; i < N; i++) {
      const yo = posCache[i * 3 + 1] * orientation;
      released[i] = yo > 0.2 ? 0 : 1;
      if (yo > 0.2) top++;
    }
    topStart = top;
    releasedCount = 0;
    clockEl.classList.remove('done');
    if (top === 0) { effDuration = baseDuration; state = 'ready'; setStatus('empty — flip again'); updateButtons(); return; }
    // a real hourglass flipped mid-run only runs for the fraction on top
    effDuration = Math.max(1, baseDuration * (top / Math.max(1, N)));
    elapsedMs = 0;
    beginRun();
  }
}

/* ============================================================ *
 *  Audio — flowing-sand noise + completion chime
 * ============================================================ */
let audioCtx = null, noiseGain = null, muted = false;
function ensureAudio() {
  if (muted) return;
  if (audioCtx) { if (audioCtx.state === 'suspended') audioCtx.resume(); return; }
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const len = audioCtx.sampleRate * 2;
    const buf = audioCtx.createBuffer(1, len, audioCtx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
    const src = audioCtx.createBufferSource();
    src.buffer = buf; src.loop = true;
    const bp = audioCtx.createBiquadFilter();
    bp.type = 'bandpass'; bp.frequency.value = 3400; bp.Q.value = 0.6;
    noiseGain = audioCtx.createGain(); noiseGain.gain.value = 0;
    src.connect(bp).connect(noiseGain).connect(audioCtx.destination);
    src.start();
  } catch { /* audio unavailable — fine */ }
}
function updateNoise() {
  if (!noiseGain) return;
  // the hiss tracks the actual release rate, so what you hear is what flows
  const target = muted || state !== 'running' ? 0 : Math.min(0.06, relRate * 0.004);
  noiseGain.gain.linearRampToValueAtTime(target, audioCtx.currentTime + 0.12);
}
function chime() {
  if (!audioCtx || muted) return;
  const t0 = audioCtx.currentTime;
  for (const [f, dt, dur] of [[659.25, 0, 0.9], [880, 0.18, 1.3]]) {
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.type = 'sine'; o.frequency.value = f;
    g.gain.setValueAtTime(0.0001, t0 + dt);
    g.gain.exponentialRampToValueAtTime(0.12, t0 + dt + 0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + dt + dur);
    o.connect(g).connect(audioCtx.destination);
    o.start(t0 + dt); o.stop(t0 + dt + dur + 0.1);
  }
}

/* ============================================================ *
 *  UI wiring
 * ============================================================ */
function setStatus(s) { statusEl.textContent = s; }
function fmt(secs) {
  secs = Math.max(0, secs);
  const h = Math.floor(secs / 3600), m = Math.floor((secs % 3600) / 60);
  const s = Math.floor(secs % 60);
  if (h > 0) return `${h}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
  if (secs < 10 && state === 'running') return `${m}:${String(s).padStart(2, '0')}.${Math.floor((secs % 1) * 10)}`;
  return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
}
function updateButtons() {
  const busy = state === 'settling' || state === 'boot' || !!flipPhase;
  startBtn.disabled = busy || state === 'done' || (state === 'ready' && topStart === 0);
  startBtn.textContent = state === 'running' ? 'Pause' : state === 'paused' ? 'Resume' : 'Start';
  flipBtn.disabled = busy;
  resetBtn.disabled = busy;
  for (const b of document.querySelectorAll('#presets .chip')) b.disabled = busy;
  const inp = $('customMin');
  inp.disabled = busy;
  if (busy) inp.blur();
}

document.getElementById('presets').addEventListener('click', (e) => {
  const chip = e.target.closest('.chip');
  if (!chip || chip.disabled) return;
  document.querySelectorAll('#presets .chip').forEach((c) => c.classList.toggle('active', c === chip));
  $('customMin').value = '';
  applyDuration(Number(chip.dataset.secs));
});
$('customMin').addEventListener('change', () => {
  if (state === 'settling' || state === 'boot' || flipPhase) return;
  const v = parseFloat($('customMin').value);
  if (!Number.isFinite(v) || v <= 0) return;
  document.querySelectorAll('#presets .chip').forEach((c) => c.classList.remove('active'));
  applyDuration(Math.min(180, Math.max(0.25, v)) * 60); // ≥15s
});

startBtn.addEventListener('click', () => {
  if (state === 'ready') beginRun();
  else if (state === 'running') { state = 'paused'; updateButtons(); setStatus('paused'); }
  else if (state === 'paused') {
    startStamp = performance.now() - elapsedMs;
    state = 'running'; updateButtons(); setStatus('flowing');
  }
});
flipBtn.addEventListener('click', startFlip);
resetBtn.addEventListener('click', fullReset);
muteBtn.addEventListener('click', () => {
  muted = !muted;
  muteBtn.textContent = muted ? '🔇' : '🔊';
  if (!muted) ensureAudio();
});
window.addEventListener('keydown', (e) => {
  if (e.repeat || e.target.tagName === 'INPUT') return;
  if (e.code === 'Space') { e.preventDefault(); startBtn.click(); }
  else if (e.key === 'f' || e.key === 'F') flipBtn.click();
  else if (e.key === 'r' || e.key === 'R') resetBtn.click();
});
window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setPixelRatio(degraded ? 1 : Math.min(window.devicePixelRatio, 2));
  renderer.setSize(innerWidth, innerHeight);
});
document.addEventListener('visibilitychange', () => {
  if (!document.hidden && audioCtx?.state === 'suspended' && !muted) audioCtx.resume();
});

/* ============================================================ *
 *  Render / physics loop
 * ============================================================ */
let acc = 0, lastT = 0, fps = 60, statsTimer = 0, frame = 0;
let lowFpsMs = 0, degraded = false, lastRaf = 0;
// throttled/background tabs can suspend rAF entirely — keep the boot settle
// moving and the clock honest on a timer; the sand reconciles on refocus
setInterval(() => {
  if (performance.now() - lastRaf < 400) return;
  if (state === 'settling' && settle) settleTick(0.3);
  else if (state === 'running' && !flipPhase) {
    elapsedMs = performance.now() - startStamp;
    if (elapsedMs / 1000 >= effDuration) finishRun();
  }
}, 300);
function loop(now) {
  requestAnimationFrame(loop);
  lastRaf = now;
  const gap = lastT ? (now - lastT) / 1000 : 0.016;
  const dtReal = Math.min(0.05, gap);
  lastT = now;
  fps = fps * 0.95 + (1 / Math.max(1e-3, dtReal)) * 0.05;
  frame++;

  if (state === 'settling') {
    settleTick(gap);
  } else if (state !== 'paused' && state !== 'boot') {
    if (flipPhase) flipTick(now);
    acc += dtReal;
    let steps = 0;
    while (acc >= DT && steps < MAX_STEPS) { world.step(); acc -= DT; steps++; }
    if (acc > DT) acc = 0; // shed backlog — the release budget absorbs it
    postStep();
    if (!flipPhase) {
      freezePass();
      if (state === 'running') {
        meter(now);
        if (elapsedMs / 1000 >= effDuration) finishRun();
      } else if (state === 'done' && releasedCount < topStart) {
        meter(now, true); // drain stragglers, banded and capped
      }
    }
  }

  updateNoise();

  if (state === 'running' || state === 'paused') clockEl.textContent = fmt(effDuration - elapsedMs / 1000);
  else if (state === 'done') clockEl.textContent = fmt(0);
  else clockEl.textContent = fmt(effDuration);

  statsTimer += dtReal;
  if (statsTimer > 0.25) {
    statsTimer = 0;
    let awake = 0;
    for (let i = 0; i < N; i++) if (!frozen[i] && !bodies[i].isSleeping()) awake++;
    const rate = topStart && effDuration ? (topStart / Math.max(1, effDuration - TRANSIT_S)).toFixed(1) : '0';
    statsEl.textContent =
      `${releasedCount.toLocaleString()} / ${topStart.toLocaleString()} grains through · ${rate}/s · ${Math.round(fps)} fps · ${awake} awake` +
      (escaped ? ` · rescued ${escaped}` : '');
  }

  if (state === 'running' && fps < 42) lowFpsMs += dtReal * 1000; else lowFpsMs = 0;
  if (lowFpsMs > 4000 && !degraded) {
    degraded = true;
    glass.material = cheapGlassMat;
    glassMat.dispose(); // one-way swap; r164 keeps its internal transmission target until renderer.dispose()
    renderer.setPixelRatio(1);
    console.info('performance fallback: simplified glass material');
  }

  controls.update();
  renderer.render(scene, camera);
}

/* ============================================================ *
 *  Boot
 * ============================================================ */
(async () => {
  try {
    overlayText.textContent = 'Waking the physics engine…';
    await RAPIER.init();
    world = new RAPIER.World({ x: 0, y: -G, z: 0 });
    world.timestep = DT;
    buildStaticColliders();
    overlayText.textContent = 'Pouring the sand…';
    buildSand();
    postStep(true);
    beginSettle('ready');
    requestAnimationFrame(loop);

    // debug/verification handle
    window.__hg = {
      get state() { return state; }, get released() { return releasedCount; },
      get topStart() { return topStart; }, get N() { return N; },
      get escaped() { return escaped; }, get fps() { return fps; },
      get elapsed() { return elapsedMs / 1000; }, get effDuration() { return effDuration; },
      get orientation() { return orientation; }, get grainR() { return GRAIN_R; },
      get frozenCount() { let n = 0; for (let i = 0; i < N; i++) if (frozen[i]) n++; return n; },
      get awake() { let n = 0; for (let i = 0; i < N; i++) if (!frozen[i] && !bodies[i].isSleeping()) n++; return n; },
      get relRate() { return relRate; },
      snap(q = 0.8) { renderer.render(scene, camera); return renderer.domElement.toDataURL('image/jpeg', q); },
    };
  } catch (err) {
    console.error(err);
    fatal(
      'Could not start the simulation. This page loads three.js and the Rapier physics engine from a CDN — make sure you are online (first load), then refresh. ' +
      'Serve the folder over HTTP if your browser blocks modules from file://. (' + (err?.message || err) + ')'
    );
  }
})();
</script>
</body>
</html>
